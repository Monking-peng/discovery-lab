name: discovery-lab

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-discovery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-discovery_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-discovery_lab}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:8.8.0-trixie@sha256:0b13f549ab871acafaa84b673c4e29bd7dce8d12526aaafe3b4ea3366c322daf
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-discovery_dev_only}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD:-discovery_dev_only}" ping | grep PONG
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:
